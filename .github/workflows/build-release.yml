name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner

    permissions:
      contents: write  # needed for gh release create

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: ./scripts/build-dmg.sh "${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG="dist/Dashy-${VERSION}-macOS.dmg"

          # Generate release notes from commits since last tag
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            COMMIT_LOG=$(git log --pretty=format:'- %s' "${PREV_TAG}..HEAD" | grep -v 'Co-Authored-By' || true)
          else
            COMMIT_LOG="- Initial release"
          fi

          NOTES="## Changes
${COMMIT_LOG}

## Install
Download \`Dashy-${VERSION}-macOS.dmg\`, open it, drag Dashy.app to Applications, and launch."

          gh release create "v${VERSION}" "$DMG" \
            --title "v${VERSION}" \
            --notes "$NOTES"
